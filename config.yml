# Vue104Parser runtime configuration

server:
  port: 33104

cors:
  enabled: true
  origins: "*"

auth:
  enabled: false
  keys:
    - "your-secret-key-here"

locale:
  default: "zh-cn"
  fallback: "en"
  frontend: "zh-cn"
  backend: "zh-cn"

logger:
  level: 3
  dir: "data/log"
  exposeDebugApi: true
  clientMirror: true

plugins:
  enabled:
    - "core.parser"
    - "core.log-viewer"
    - "core.db-tools"
    - "core.theme-ocean"
    - "core.theme-graphite"
  stateFile: "data/plugins.json"

theme:
  defaultMode: "system"
  defaultTheme: "theme-ocean"

site:
  copyright: "© 2026 Vue104Parser by Twiyin0"
  icp: ""
  icp_url: "https://beian.miit.gov.cn/"
  police: ""
  police_url: "https://www.beian.gov.cn/"
