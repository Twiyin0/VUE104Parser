# IEC 104/101 Parser 配置文件

server:
  port: 33104

cors:
  enabled: true
  origins: "*"  # "*" 允许所有来源，或指定数组 ["https://example.com", "http://localhost:3000"]

auth:
  enabled: false  # 设为 true 开启 API Key 校验
  keys:           # 有效的 API Key 列表
    - "your-secret-key-here"

# 站点信息（显示在页面底部 footer）
site:
  copyright: "© 2026 Vue104Parser by Twiyin0"
  icp: ""                # ICP 备案号，如 "京ICP备XXXXXXXX号"
  icp_url: "https://beian.miit.gov.cn/"
  police: ""             # 公安备案号，如 "京公网安备XXXXXXXXXX号"
  police_url: "https://www.beian.gov.cn/"
